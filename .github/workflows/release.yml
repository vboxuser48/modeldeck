name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install Dependencies
        run: npm ci

      - name: Install Python Dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Install Playwright browser (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browser (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E smoke tests
        run: npm run test:e2e

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            label: linux-appimage
          - os: windows-latest
            target: win
            label: windows-nsis
          - os: macos-latest
            target: mac
            label: macos-dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install Dependencies
        run: npm ci

      - name: Install Python Dependencies
        run: python -m pip install -r python/requirements.txt

      - name: Build Installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build && npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modeldeck-${{ matrix.label }}
          path: release/*

      - name: Upload To GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
